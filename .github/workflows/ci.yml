name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          extensions: pdo, pdo_mysql, pdo_sqlite, openssl

      - name: Instalar dependências
        run: composer install --no-progress --prefer-dist

      - name: Auditar CVEs nas dependências
        run: composer audit

      - name: Verificar padrões de segurança (PHPCS)
        run: |
          vendor/bin/phpcs --config-set installed_paths $(pwd)/vendor/pheromone/phpcs-security-audit
          vendor/bin/phpcs --standard=Security -n --ignore=src/Views src/

  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    needs: security-scan

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: salve_alimento
          MYSQL_USER: app_user
          MYSQL_PASSWORD: test_pass
          MYSQL_ROOT_PASSWORD: root_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: salve_alimento
      DB_USER: app_user
      DB_PASS: test_pass
      JWT_SECRET: ci_test_secret
      JWT_ISSUER: salve-alimento
      JWT_EXPIRY: 1800
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, phpunit
          extensions: pdo, pdo_mysql, pdo_sqlite, openssl

      - name: Instalar dependências
        run: composer install --no-progress --prefer-dist

      - name: Inicializar schema do banco
        run: mysql -h 127.0.0.1 -u root -proot_pass < database/init.sql

      - name: Executar testes unitários
        run: vendor/bin/phpunit --testdox tests/
