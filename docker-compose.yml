version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    expose:
      - "80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=salve_alimento
      - DB_USER=app_user
      - DB_PASS=${DB_PASS}
      - RSA_PRIVATE_KEY_PATH=/var/www/html/keys/private.pem
      - RSA_PUBLIC_KEY_PATH=/var/www/html/keys/public.pem
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=salve-alimento
      - JWT_EXPIRY=1800
      - APP_ENV=${APP_ENV:-development}
      - APP_URL=https://localhost:8443
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: salve_alimento
      MYSQL_USER: app_user
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=\"$$MYSQL_ROOT_PASSWORD\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

volumes:
  db_data:
